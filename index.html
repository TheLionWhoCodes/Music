<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TidalGet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#13131a;--s2:#1c1c27;--bd:#2a2a3a;
  --ac:#00e5ff;--ac2:#7c3aed;--tx:#e8e8f0;--mu:#6b6b80;
  --ok:#00e676;--er:#ff5252;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,229,255,.07) 0%,transparent 60%)}
.app{max-width:800px;margin:0 auto;padding:2rem 1.5rem 5rem}

header{display:flex;align-items:center;justify-content:space-between;
  padding:1.5rem 0 2rem;border-bottom:1px solid var(--bd);margin-bottom:2rem}
.logo{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;letter-spacing:-1px}
.logo span{color:var(--ac)}
.badge{display:flex;align-items:center;gap:.5rem;background:var(--s2);
  border:1px solid var(--bd);border-radius:100px;padding:.35rem .75rem .35rem .5rem;
  font-size:.8rem;color:var(--mu)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mu)}
.dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:1.5rem;margin-bottom:1.25rem}
.label{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--mu);margin-bottom:.9rem}
.row{display:flex;gap:.75rem}
input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  color:var(--tx);padding:.72rem 1rem;font-family:'Space Mono',monospace;
  font-size:.78rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--ac)}
input::placeholder{color:var(--mu)}

.btn{padding:.72rem 1.2rem;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:.88rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-ac{background:var(--ac);color:#000}
.btn-ac:hover{background:#33eaff;transform:translateY(-1px)}
.btn-ac2{background:var(--ac2);color:#fff}
.btn-ac2:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-out{background:transparent;border:1px solid var(--er);color:var(--er)}
.btn-out:hover{background:rgba(255,82,82,.1)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.plan-tag{display:inline-flex;align-items:center;gap:.35rem;
  padding:.28rem .65rem;border-radius:100px;font-size:.75rem;font-weight:600;margin-top:.5rem}
.plan-hi{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.35)}
.plan-hf{background:rgba(0,229,255,.1);color:var(--ac);border:1px solid rgba(0,229,255,.3)}
.plan-pr{background:rgba(0,230,118,.1);color:var(--ok);border:1px solid rgba(0,230,118,.3)}
.plan-ba{background:rgba(107,107,128,.1);color:var(--mu);border:1px solid var(--bd)}
.fmt-info{font-size:.75rem;color:var(--mu);margin-top:.4rem}
.fmt-info b{color:var(--tx)}

.opts{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  padding:.7rem 0;border-top:1px solid var(--bd);margin-top:.75rem}
.tog-wrap{display:flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none}
.tog{position:relative;width:36px;height:20px;background:var(--bd);
  border-radius:100px;transition:background .2s;flex-shrink:0}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
  border-radius:50%;background:var(--mu);transition:all .2s}
.tog.on{background:var(--ac)}
.tog.on::after{left:19px;background:#000}
.tog-lbl{font-size:.83rem;color:var(--mu)}

.res-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.res-meta{font-size:.85rem;color:var(--mu)}
.res-meta b{color:var(--tx)}
.cover-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
.cover-img{width:64px;height:64px;border-radius:8px;object-fit:cover}
.cover-t{font-weight:700;font-size:1rem}
.cover-a{color:var(--mu);font-size:.85rem;margin-top:2px}

.sel-all{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;
  margin-bottom:.4rem;border-bottom:1px solid var(--bd);
  font-size:.82rem;color:var(--mu);cursor:pointer}
.sel-all:hover{color:var(--tx)}
.tlist{display:flex;flex-direction:column;gap:2px}
.ti{display:flex;align-items:center;gap:.7rem;padding:.6rem .7rem;
  border-radius:8px;transition:background .15s;cursor:pointer}
.ti:hover{background:var(--s2)}
.ti.sel{background:rgba(0,229,255,.06)}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ti.sel .chk{background:var(--ac);border-color:var(--ac)}
.ti.sel .chk::after{content:'✓';font-size:10px;color:#000;font-weight:700}
.tnum{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--mu);
  width:20px;text-align:right;flex-shrink:0}
.tinf{flex:1;min-width:0}
.ttl{font-size:.87rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:.72rem;color:var(--mu);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tdur{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--mu);flex-shrink:0}
.tbtns{display:flex;gap:.35rem;flex-shrink:0}
.tb{background:transparent;border:1px solid var(--bd);color:var(--mu);
  border-radius:6px;padding:.25rem .5rem;font-size:.7rem;cursor:pointer;transition:all .15s}
.tb.a:hover{border-color:var(--ac);color:var(--ac)}
.tb.l:hover{border-color:var(--ac2);color:var(--ac2)}
.tb.spin{animation:pulse 1s infinite}
.tb.a.spin{color:var(--ac);border-color:var(--ac)}
.tb.l.spin{color:var(--ac2);border-color:var(--ac2)}
.tb.done{color:var(--ok);border-color:var(--ok)}
.tb.fail{color:var(--er);border-color:var(--er)}

.dlbar{position:fixed;bottom:0;left:0;right:0;background:var(--s1);
  border-top:1px solid var(--bd);padding:1rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:100}
.dlbar.on{transform:translateY(0)}
.dlbar-cnt b{color:var(--ac);font-family:'Space Mono',monospace}
.dlbar-btns{display:flex;gap:.6rem}

.toast{position:fixed;top:1.25rem;right:1.25rem;background:var(--s2);
  border:1px solid var(--bd);border-radius:var(--r);padding:.75rem 1rem;
  font-size:.83rem;z-index:999;opacity:0;transform:translateX(16px);
  transition:all .22s;max-width:270px}
.toast.on{opacity:1;transform:translateX(0)}
.toast.ok{border-color:var(--ok);color:var(--ok)}
.toast.er{border-color:var(--er);color:var(--er)}

.hidden{display:none!important}
.sp{display:inline-block;width:13px;height:13px;border:2px solid var(--bd);
  border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.help{font-size:.73rem;color:var(--mu);margin-top:.6rem;line-height:1.6}
code{background:var(--s2);padding:1px 5px;border-radius:4px;font-size:.7rem}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Tidal<span>Get</span></div>
  <div class="badge"><div class="dot" id="dot"></div><span id="uname">Sin sesión</span></div>
</header>

<!-- Token -->
<div class="card">
  <div class="label">🔑 Token de Tidal</div>
  <div id="tf">
    <div class="row">
      <input type="password" id="ti" placeholder="Pega tu accessToken aquí...">
      <button class="btn btn-ac" onclick="doLogin()">Conectar</button>
    </div>
    <div class="help">Token solo existe en tu sesión, no se guarda en ningún servidor.<br>
    Cómo obtenerlo: <b>tidal.com</b> → F12 → Application → Local Storage → <code>access_token</code></div>
  </div>
  <div id="tl" class="hidden">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
      <div>
        <div style="font-weight:700;font-size:.95rem" id="lname"></div>
        <div class="plan-tag plan-ba" id="ptag"></div>
        <div class="fmt-info">Descargará en: <b id="fmtlbl"></b></div>
      </div>
      <button class="btn btn-out" onclick="doLogout()">Salir</button>
    </div>
  </div>
</div>

<!-- URL -->
<div class="card hidden" id="urlcard">
  <div class="label">🔗 URL de Tidal</div>
  <div class="row">
    <input type="text" id="urli" placeholder="https://tidal.com/browse/track/...">
    <button class="btn btn-ac" id="sbtn" onclick="doSearch()">Buscar</button>
  </div>
  <div class="opts">
    <div class="tog-wrap" onclick="togLyrics()">
      <div class="tog on" id="ltog"></div>
      <span class="tog-lbl" id="llbl">Letras activadas</span>
    </div>
  </div>
</div>

<!-- Resultados -->
<div class="card hidden" id="rescard">
  <div class="res-hdr">
    <div class="label" style="margin:0">📋 Resultados</div>
    <div class="res-meta" id="rmeta"></div>
  </div>
  <div class="cover-row hidden" id="crow">
    <img class="cover-img" id="cimg" src="" alt="">
    <div><div class="cover-t" id="ctitle"></div><div class="cover-a" id="cartist"></div></div>
  </div>
  <div class="sel-all" onclick="togAll()">
    <div class="chk" id="achk"></div><span id="albl">Seleccionar todo</span>
  </div>
  <div class="tlist" id="tlist"></div>
</div>

</div>

<!-- Barra inferior -->
<div class="dlbar" id="dlbar">
  <div class="dlbar-cnt"><b id="dlcnt">0</b> seleccionadas</div>
  <div class="dlbar-btns">
    <button class="btn btn-ac" onclick="dlSelAudio()">⬇ Audio</button>
    <button class="btn btn-ac2" onclick="dlSelLRC()">⬇ LRC</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tracks=[], sel=new Set(), lyr=true, allS=false, plan='', ext='mp3';

const PLANS = {
  "HiFi Plus 🎵": {cls:"plan-hi", fmt:"FLAC 24bit (Master)"},
  "HiFi 💎":      {cls:"plan-hf", fmt:"FLAC 16bit"},
  "Premium 🟢":   {cls:"plan-pr", fmt:"AAC 320kbps"},
  "Básico ⚪":    {cls:"plan-ba", fmt:"AAC 96kbps"},
};

async function init(){
  try{
    const d=await(await fetch('/api/token/status')).json();
    if(d.logged_in) applyLogin(d);
  }catch{}
}

async function doLogin(){
  const token=document.getElementById('ti').value.trim();
  if(!token) return toast('Pega tu token primero','er');
  const btn=document.querySelector('#tf .btn-ac');
  btn.disabled=true; btn.innerHTML='<span class="sp"></span>Verificando...';
  try{
    const d=await(await fetch('/api/token',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({token})})).json();
    if(d.ok){ applyLogin(d); toast('Conectado · '+d.plan,'ok'); }
    else toast(d.error||'Token inválido','er');
  }catch{ toast('Error de conexión','er'); }
  finally{ btn.disabled=false; btn.innerHTML='Conectar'; }
}

async function doLogout(){
  await fetch('/api/token',{method:'DELETE'});
  document.getElementById('tf').classList.remove('hidden');
  document.getElementById('tl').classList.add('hidden');
  document.getElementById('ti').value='';
  document.getElementById('uname').textContent='Sin sesión';
  document.getElementById('dot').classList.remove('on');
  document.getElementById('urlcard').classList.add('hidden');
  document.getElementById('rescard').classList.add('hidden');
  toast('Sesión cerrada');
}

function applyLogin(d){
  plan=d.plan||'Básico ⚪'; ext=d.quality||'Normal';
  const meta=PLANS[plan]||PLANS['Básico ⚪'];
  document.getElementById('tf').classList.add('hidden');
  document.getElementById('tl').classList.remove('hidden');
  document.getElementById('lname').textContent=d.user||'Usuario Tidal';
  document.getElementById('uname').textContent=d.user||'Usuario Tidal';
  document.getElementById('dot').classList.add('on');
  const ptag=document.getElementById('ptag');
  ptag.className='plan-tag '+meta.cls;
  ptag.textContent=plan;
  document.getElementById('fmtlbl').textContent=meta.fmt;
  document.getElementById('urlcard').classList.remove('hidden');
}

function togLyrics(){
  lyr=!lyr;
  document.getElementById('ltog').classList.toggle('on',lyr);
  document.getElementById('llbl').textContent=lyr?'Letras activadas':'Letras desactivadas';
}

async function doSearch(){
  const url=document.getElementById('urli').value.trim();
  if(!url) return toast('Pega una URL de Tidal','er');
  const btn=document.getElementById('sbtn');
  btn.disabled=true; btn.innerHTML='<span class="sp"></span>';
  try{
    const d=await(await fetch('/api/info',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({url})})).json();
    if(d.error) toast(d.error,'er'); else render(d);
  }catch{ toast('Error al buscar','er'); }
  finally{ btn.disabled=false; btn.innerHTML='Buscar'; }
}

function render(data){
  tracks=data.tracks; sel.clear(); allS=false;
  if(data.cover){
    document.getElementById('cimg').src=data.cover;
    document.getElementById('ctitle').textContent=data.title;
    document.getElementById('cartist').textContent=data.artist||'';
    document.getElementById('crow').classList.remove('hidden');
  } else document.getElementById('crow').classList.add('hidden');
  document.getElementById('rmeta').innerHTML=`<b>${tracks.length}</b> canción${tracks.length!==1?'es':''}`;

  document.getElementById('tlist').innerHTML=tracks.map((t,i)=>`
    <div class="ti" id="ti${i}" onclick="togTi(${i})">
      <div class="chk" id="chk${i}"></div>
      <div class="tnum">${i+1}</div>
      <div class="tinf">
        <div class="ttl">${esc(t.title)}</div>
        <div class="tsub">${esc(t.artist)}${t.album?' · '+esc(t.album):''}</div>
      </div>
      <div class="tdur">${t.duration}</div>
      <div class="tbtns">
        <button class="tb a" id="ab${i}" onclick="event.stopPropagation();dlAudio(${i})">⬇ Audio</button>
        <button class="tb l" id="lb${i}" onclick="event.stopPropagation();dlLRC(${i})">⬇ LRC</button>
      </div>
    </div>`).join('');

  document.getElementById('rescard').classList.remove('hidden');
  updBar();
}

function togTi(i){
  sel.has(i)?sel.delete(i):sel.add(i);
  document.getElementById('ti'+i).classList.toggle('sel',sel.has(i));
  updBar();
}

function togAll(){
  allS=!allS; sel.clear();
  if(allS) tracks.forEach((_,i)=>sel.add(i));
  tracks.forEach((_,i)=>document.getElementById('ti'+i).classList.toggle('sel',allS));
  const ac=document.getElementById('achk'),al=document.getElementById('albl');
  if(allS){ac.style.cssText='background:var(--ac);border-color:var(--ac)';
    ac.innerHTML='<span style="font-size:10px;color:#000;font-weight:700">✓</span>';
    al.textContent='Deseleccionar todo';}
  else{ac.style.cssText='';ac.innerHTML='';al.textContent='Seleccionar todo';}
  updBar();
}

function updBar(){
  document.getElementById('dlcnt').textContent=sel.size;
  document.getElementById('dlbar').classList.toggle('on',sel.size>0);
}

function dlAudio(i){
  const t=tracks[i],btn=document.getElementById('ab'+i);
  btn.className='tb a spin'; btn.textContent='⟳';
  toast(`Descargando: ${t.title} (puede tardar ~20s)...`);
  const a=document.createElement('a');
  a.href=`/api/download/${t.id}?lyrics=${lyr}`;
  a.download=`${t.artist} - ${t.title}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>{btn.className='tb a done';btn.textContent='✓ Audio';},3000);
}

function dlLRC(i){
  const t=tracks[i],btn=document.getElementById('lb'+i);
  btn.className='tb l spin'; btn.textContent='⟳';
  toast(`Obteniendo letras: ${t.title}...`);
  const a=document.createElement('a');
  a.href=`/api/lrc/${t.id}`;
  a.download=`${t.artist} - ${t.title}.lrc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>{btn.className='tb l done';btn.textContent='✓ LRC';},3000);
}

async function dlSelAudio(){
  const idx=Array.from(sel);
  toast(`Descargando ${idx.length} audio${idx.length>1?'s':''}...`,'ok');
  for(let i=0;i<idx.length;i++){await new Promise(r=>setTimeout(r,i*1000));dlAudio(idx[i]);}
}

async function dlSelLRC(){
  const idx=Array.from(sel);
  toast(`Descargando ${idx.length} LRC...`,'ok');
  for(let i=0;i<idx.length;i++){await new Promise(r=>setTimeout(r,i*800));dlLRC(idx[i]);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast on'+(type?' '+type:'');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('on'),3500);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('urli').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
  document.getElementById('ti').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  init();
});
</script>
</body>
</html>
