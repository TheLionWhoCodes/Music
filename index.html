<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TidalGet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27;
    --border:#2a2a3a; --accent:#00e5ff; --accent2:#7c3aed;
    --text:#e8e8f0; --muted:#6b6b80; --success:#00e676; --error:#ff5252; --radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,229,255,.07) 0%,transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%,rgba(124,58,237,.05) 0%,transparent 50%);
  }
  .app{max-width:820px;margin:0 auto;padding:2rem 1.5rem 5rem;}
  header{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem;}
  .logo{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;letter-spacing:-1px;}
  .logo span{color:var(--accent);}
  .user-badge{display:flex;align-items:center;gap:.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:.4rem .8rem .4rem .5rem;font-size:.8rem;color:var(--muted);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .dot.on{background:var(--success);box-shadow:0 0 8px var(--success);}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;}
  .section-title{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
  .input-row{display:flex;gap:.75rem;}
  input[type="text"],input[type="password"]{
    flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:.75rem 1rem;font-family:'Space Mono',monospace;font-size:.78rem;outline:none;transition:border-color .2s;
  }
  input:focus{border-color:var(--accent);}
  input::placeholder{color:var(--muted);}
  .btn{padding:.75rem 1.25rem;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:#33eaff;transform:translateY(-1px);}
  .btn-danger{background:transparent;border:1px solid var(--error);color:var(--error);}
  .btn-danger:hover{background:rgba(255,82,82,.1);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

  .options-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;padding:.75rem 0;border-top:1px solid var(--border);margin-top:.75rem;}
  .opt-label{font-size:.8rem;color:var(--muted);}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.5rem .75rem;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}
  select:focus{border-color:var(--accent);}
  .toggle-wrap{display:flex;align-items:center;gap:.5rem;cursor:pointer;}
  .toggle{position:relative;width:36px;height:20px;background:var(--border);border-radius:100px;transition:background .2s;}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--muted);transition:all .2s;}
  .toggle.on{background:var(--accent);}
  .toggle.on::after{left:19px;background:#000;}
  .toggle-label{font-size:.83rem;color:var(--muted);user-select:none;}

  .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .results-meta{font-size:.85rem;color:var(--muted);}
  .results-meta strong{color:var(--text);}
  .cover-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;}
  .cover-img{width:64px;height:64px;border-radius:8px;object-fit:cover;}
  .cover-title{font-weight:700;font-size:1rem;}
  .cover-artist{color:var(--muted);font-size:.85rem;margin-top:2px;}

  .select-all-row{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;margin-bottom:.5rem;border-bottom:1px solid var(--border);font-size:.83rem;color:var(--muted);cursor:pointer;}
  .select-all-row:hover{color:var(--text);}
  .track-list{display:flex;flex-direction:column;gap:2px;}
  .track-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;border-radius:8px;transition:background .15s;cursor:pointer;}
  .track-item:hover{background:var(--surface2);}
  .track-item.selected{background:rgba(0,229,255,.06);}
  .chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .track-item.selected .chk{background:var(--accent);border-color:var(--accent);}
  .track-item.selected .chk::after{content:'✓';font-size:10px;color:#000;font-weight:700;}
  .track-num{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);width:22px;text-align:right;flex-shrink:0;}
  .track-info{flex:1;min-width:0;}
  .track-title{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .track-sub{font-size:.73rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .track-dur{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);flex-shrink:0;}

  /* Botones de descarga por track */
  .track-btns{display:flex;gap:.4rem;flex-shrink:0;}
  .dl-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:6px;padding:.28rem .55rem;font-size:.72rem;cursor:pointer;transition:all .15s;
    white-space:nowrap;
  }
  .dl-btn.audio:hover{border-color:var(--accent);color:var(--accent);}
  .dl-btn.lrc:hover{border-color:var(--accent2);color:var(--accent2);}
  .dl-btn.loading{animation:pulse 1s infinite;}
  .dl-btn.audio.loading{color:var(--accent);border-color:var(--accent);}
  .dl-btn.lrc.loading{color:var(--accent2);border-color:var(--accent2);}
  .dl-btn.done{color:var(--success);border-color:var(--success);}
  .dl-btn.err{color:var(--error);border-color:var(--error);}

  /* Barra inferior */
  .dl-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--border);
    padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
    gap:1rem;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:100;
  }
  .dl-bar.visible{transform:translateY(0);}
  .dl-count strong{color:var(--accent);font-family:'Space Mono',monospace;}
  .bar-btns{display:flex;gap:.6rem;}

  .toast{position:fixed;top:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1.1rem;font-size:.85rem;z-index:999;opacity:0;transform:translateX(20px);transition:all .25s;max-width:280px;}
  .toast.show{opacity:1;transform:translateX(0);}
  .toast.success{border-color:var(--success);color:var(--success);}
  .toast.error{border-color:var(--error);color:var(--error);}
  .hidden{display:none!important;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .help-text{font-size:.75rem;color:var(--muted);margin-top:.6rem;line-height:1.6;}
  code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:.72rem;}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Tidal<span>Get</span></div>
    <div class="user-badge">
      <div class="dot" id="dot"></div>
      <span id="user-name">Sin sesión</span>
    </div>
  </header>

  <!-- Token -->
  <div class="section">
    <div class="section-title">🔑 Token de Tidal</div>
    <div id="token-form">
      <div class="input-row">
        <input type="password" id="token-input" placeholder="Pega tu accessToken aquí..." />
        <button class="btn btn-primary" onclick="submitToken()">Conectar</button>
      </div>
      <div class="help-text">
        Tu token solo existe en tu sesión, no se guarda en ningún servidor.<br>
        ¿Cómo obtenerlo? <strong>tidal.com</strong> → F12 → Application → Local Storage → <code>access_token</code>
      </div>
    </div>
    <div id="token-logged" class="hidden">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:600" id="logged-name">Usuario Tidal</div>
          <div class="help-text" style="margin-top:2px">Sesión activa ✓</div>
        </div>
        <button class="btn btn-danger" onclick="clearToken()">Salir</button>
      </div>
    </div>
  </div>

  <!-- URL + Opciones -->
  <div class="section hidden" id="url-section">
    <div class="section-title">🔗 URL de Tidal</div>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://tidal.com/browse/track/..." />
      <button class="btn btn-primary" id="search-btn" onclick="searchURL()">Buscar</button>
    </div>
    <div class="options-row">
      <span class="opt-label">Calidad:</span>
      <select id="quality-select">
        <option value="Master">🎵 Master (HiRes)</option>
        <option value="HiFi" selected>🎶 HiFi (FLAC)</option>
        <option value="High">🔊 High (AAC 320)</option>
        <option value="Normal">📻 Normal (AAC 96)</option>
      </select>
      <div class="toggle-wrap" onclick="toggleLyrics()">
        <div class="toggle on" id="lyr-toggle"></div>
        <span class="toggle-label" id="lyr-label">Letras activadas</span>
      </div>
    </div>
  </div>

  <!-- Resultados -->
  <div class="section hidden" id="results-section">
    <div class="results-header">
      <div class="section-title" style="margin:0">📋 Resultados</div>
      <div class="results-meta" id="results-meta"></div>
    </div>
    <div id="cover-row" class="cover-row hidden">
      <img id="cover-img" class="cover-img" src="" alt="">
      <div>
        <div class="cover-title" id="cover-title"></div>
        <div class="cover-artist" id="cover-artist"></div>
      </div>
    </div>
    <div class="select-all-row" onclick="toggleSelectAll()">
      <div class="chk" id="all-chk"></div>
      <span id="all-label">Seleccionar todo</span>
    </div>
    <div class="track-list" id="track-list"></div>
  </div>

</div>

<!-- Barra inferior -->
<div class="dl-bar" id="dl-bar">
  <div class="dl-count"><strong id="dl-count">0</strong> seleccionadas</div>
  <div class="bar-btns">
    <button class="btn btn-primary" onclick="downloadSelectedAudio()">⬇ Audio</button>
    <button class="btn" style="background:var(--accent2);color:#fff" onclick="downloadSelectedLRC()">⬇ LRC</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tracks=[], selected=new Set(), lyricsOn=true, allSel=false;

async function init(){
  try{
    const d=await(await fetch('/api/token/status')).json();
    if(d.logged_in) setLoggedIn(d.user);
  }catch{}
}

async function submitToken(){
  const token=document.getElementById('token-input').value.trim();
  if(!token) return toast('Pega tu token primero','error');
  const btn=document.querySelector('#token-form .btn-primary');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Verificando...';
  try{
    const d=await(await fetch('/api/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})})).json();
    if(d.ok){setLoggedIn(d.user);toast('Sesión iniciada ✓','success');}
    else toast(d.error||'Token inválido','error');
  }catch{toast('Error de conexión','error');}
  finally{btn.disabled=false;btn.innerHTML='Conectar';}
}

async function clearToken(){
  await fetch('/api/token',{method:'DELETE'});
  setLoggedOut(); toast('Sesión cerrada');
}

function setLoggedIn(name){
  document.getElementById('token-form').classList.add('hidden');
  document.getElementById('token-logged').classList.remove('hidden');
  document.getElementById('logged-name').textContent=name;
  document.getElementById('user-name').textContent=name;
  document.getElementById('dot').classList.add('on');
  document.getElementById('url-section').classList.remove('hidden');
}

function setLoggedOut(){
  document.getElementById('token-form').classList.remove('hidden');
  document.getElementById('token-logged').classList.add('hidden');
  document.getElementById('token-input').value='';
  document.getElementById('user-name').textContent='Sin sesión';
  document.getElementById('dot').classList.remove('on');
  document.getElementById('url-section').classList.add('hidden');
  document.getElementById('results-section').classList.add('hidden');
}

function toggleLyrics(){
  lyricsOn=!lyricsOn;
  document.getElementById('lyr-toggle').classList.toggle('on',lyricsOn);
  document.getElementById('lyr-label').textContent=lyricsOn?'Letras activadas':'Letras desactivadas';
}

async function searchURL(){
  const url=document.getElementById('url-input').value.trim();
  if(!url) return toast('Pega una URL de Tidal','error');
  const btn=document.getElementById('search-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try{
    const d=await(await fetch('/api/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})})).json();
    if(d.error) toast(d.error,'error'); else renderResults(d);
  }catch{toast('Error al buscar','error');}
  finally{btn.disabled=false;btn.innerHTML='Buscar';}
}

function renderResults(data){
  tracks=data.tracks; selected.clear(); allSel=false;
  if(data.cover){
    document.getElementById('cover-img').src=data.cover;
    document.getElementById('cover-title').textContent=data.title;
    document.getElementById('cover-artist').textContent=data.artist||'';
    document.getElementById('cover-row').classList.remove('hidden');
  } else document.getElementById('cover-row').classList.add('hidden');

  document.getElementById('results-meta').innerHTML=
    `<strong>${tracks.length}</strong> canción${tracks.length!==1?'es':''}`;

  document.getElementById('track-list').innerHTML=tracks.map((t,i)=>`
    <div class="track-item" id="ti-${i}" onclick="toggleTrack(${i})">
      <div class="chk" id="chk-${i}"></div>
      <div class="track-num">${i+1}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.title)}</div>
        <div class="track-sub">${esc(t.artist)}${t.album?' · '+esc(t.album):''}</div>
      </div>
      <div class="track-dur">${t.duration}</div>
      <div class="track-btns">
        <button class="dl-btn audio" id="ab-${i}" onclick="event.stopPropagation();dlAudio(${i})" title="Descargar audio">⬇ Audio</button>
        <button class="dl-btn lrc"   id="lb-${i}" onclick="event.stopPropagation();dlLRC(${i})"   title="Descargar letras">⬇ LRC</button>
      </div>
    </div>`).join('');

  document.getElementById('results-section').classList.remove('hidden');
  updateBar();
}

function toggleTrack(i){
  selected.has(i)?selected.delete(i):selected.add(i);
  document.getElementById(`ti-${i}`).classList.toggle('selected',selected.has(i));
  updateBar();
}

function toggleSelectAll(){
  allSel=!allSel; selected.clear();
  if(allSel) tracks.forEach((_,i)=>selected.add(i));
  tracks.forEach((_,i)=>document.getElementById(`ti-${i}`).classList.toggle('selected',allSel));
  const ac=document.getElementById('all-chk'),al=document.getElementById('all-label');
  if(allSel){
    ac.style.cssText='background:var(--accent);border-color:var(--accent)';
    ac.innerHTML='<span style="font-size:10px;color:#000;font-weight:700">✓</span>';
    al.textContent='Deseleccionar todo';
  } else {ac.style.cssText='';ac.innerHTML='';al.textContent='Seleccionar todo';}
  updateBar();
}

function updateBar(){
  document.getElementById('dl-count').textContent=selected.size;
  document.getElementById('dl-bar').classList.toggle('visible',selected.size>0);
}

// ── Descarga individual ────────────────────────────────────────────────────

function dlAudio(i){
  const t=tracks[i], btn=document.getElementById(`ab-${i}`);
  const quality=document.getElementById('quality-select').value;
  btn.className='dl-btn audio loading'; btn.textContent='⟳';
  const a=document.createElement('a');
  a.href=`/api/download/${t.id}?quality=${quality}&lyrics=${lyricsOn}`;
  a.download=`${t.artist} - ${t.title}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>{btn.className='dl-btn audio done';btn.textContent='✓ Audio';},1500);
  toast(`⬇ ${t.title}`,'success');
}

function dlLRC(i){
  const t=tracks[i], btn=document.getElementById(`lb-${i}`);
  btn.className='dl-btn lrc loading'; btn.textContent='⟳';
  const a=document.createElement('a');
  a.href=`/api/lrc/${t.id}`;
  a.download=`${t.artist} - ${t.title}.lrc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>{btn.className='dl-btn lrc done';btn.textContent='✓ LRC';},1500);
  toast(`⬇ LRC: ${t.title}`,'success');
}

// ── Descarga masiva ────────────────────────────────────────────────────────

async function downloadSelectedAudio(){
  const idx=Array.from(selected);
  toast(`Descargando ${idx.length} audio${idx.length>1?'s':''}...`,'success');
  for(let i=0;i<idx.length;i++){await new Promise(r=>setTimeout(r,i*900));dlAudio(idx[i]);}
}

async function downloadSelectedLRC(){
  const idx=Array.from(selected);
  toast(`Descargando ${idx.length} LRC...`,'success');
  for(let i=0;i<idx.length;i++){await new Promise(r=>setTimeout(r,i*700));dlLRC(idx[i]);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let toastTimer;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('url-input').addEventListener('keydown',e=>{if(e.key==='Enter')searchURL();});
  document.getElementById('token-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitToken();});
  init();
});
</script>
</body>
</html>
